function el(tag,cls,html){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html!==undefined) e.innerHTML=html;
  return e;
}

const TODAY_DOW = new Date().getDay();

let S={tab:'daily',checked:{},expanded:{},choices:{},sections:{},dayType:'none',metSubTab:'log',chartMetric:'hr',chartRange:'week',rtab:'Skin AM'};

function load(){
  try{
    const raw=localStorage.getItem('lmx3');
    if(!raw) return;
    const d=JSON.parse(raw);
    const today=new Date().toDateString();
    if(d.date===today){ S.checked=d.checked||{}; S.choices=d.choices||{}; S.dayType=d.dayType||'none'; }
    if(d.expanded) S.expanded=d.expanded;
    if(d.sections) S.sections=d.sections;
    if(d.tab) S.tab=d.tab;
    if(d.rtab) S.rtab=d.rtab;
    if(d.metSubTab) S.metSubTab=d.metSubTab;
    if(d.chartMetric) S.chartMetric=d.chartMetric;
    if(d.chartRange) S.chartRange=d.chartRange;
  }catch(e){}
}

function save(){
  try{
    localStorage.setItem('lmx3',JSON.stringify({...S,date:new Date().toDateString()}));
  }catch(e){}
}

function tagEl(t){
  const s=TAGS[t]||{bg:'#1a1a22',c:'#666'};
  const e=el('span','tag',t);
  e.style.background=s.bg;
  e.style.color=s.c;
  return e;
}

function chkSVG(){ return '<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'; }
function chevSVG(up){ const d=up?'M2 8L6 4L10 8':'M2 4L6 8L10 4'; return `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="${d}" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }

function itemVisible(item){
  if(item.showOnDays&&!item.showOnDays.includes(TODAY_DOW)) return false;
  if(item.showIf&&!Object.values(S.choices).includes(item.showIf)) return false;
  return true;
}

function allCheckable(arr){
  const out=[];
  arr.forEach(i=>{
    if(i.type==='group') i.children.forEach(c=>{ if(!c.type) out.push(c); });
    else if(i.type==='choice') out.push(i);
    else if(!i.type&&itemVisible(i)) out.push(i);
  });
  return out;
}

function makeCollapsSection(secId,title,color,items){
  const isOpen=S.sections[secId]!==false;
  const ck=allCheckable(items);
  const done=ck.filter(i=>S.checked[i.id]).length;
  const wrap=el('div');
  const hd=el('div','csec-hd');
  hd.innerHTML=`<div class="sec-left"><div class="sec-dot" style="background:${color}"></div><span class="sec-lbl" style="color:${color}">${title}</span></div><div style="display:flex;align-items:center;gap:8px"><span class="sec-ct">${done}/${ck.length}</span><span style="color:#2E2E38">${chevSVG(!isOpen)}</span></div>`;
  hd.onclick=()=>{S.sections[secId]=!isOpen;save();renderContent();};
  wrap.appendChild(hd);
  if(isOpen){
    items.forEach(item=>{
      if(!item.type&&!itemVisible(item)) return;
      if(item.showIf&&!Object.values(S.choices).includes(item.showIf)) return;
      if(item.type==='header') wrap.appendChild(makeGrpHd(item.text));
      else if(item.type==='group') wrap.appendChild(makeGroup(item));
      else if(item.type==='choice') wrap.appendChild(makeChoice(item));
      else wrap.appendChild(makeCheckRow(item));
    });
  }
  return wrap;
}

function getMetricHistory(metricId,days){
  const result=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key='metrics_'+d.toISOString().split('T')[0];
    let val=null;
    try{const st=JSON.parse(localStorage.getItem(key)||'{}');if(st[metricId]!==undefined)val=st[metricId];}catch(e){}
    const lbl=d.toLocaleDateString('en-US',days<=7?{weekday:'short'}:{month:'short',day:'numeric'});
    result.push({date:d,value:val,label:lbl});
  }
  return result;
}

function getMetricHistoryMonthly(metricId,months){
  const result=[];
  for(let i=months-1;i>=0;i--){
    const ref=new Date();ref.setMonth(ref.getMonth()-i);
    const yr=ref.getFullYear(),mo=ref.getMonth();
    const daysIn=new Date(yr,mo+1,0).getDate();
    let sum=0,cnt=0;
    for(let d=1;d<=daysIn;d++){
      const key=`metrics_${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      try{const st=JSON.parse(localStorage.getItem(key)||'{}');if(st[metricId]!==undefined){sum+=st[metricId];cnt++;}}catch(e){}
    }
    result.push({date:ref,value:cnt>0?Math.round(sum/cnt*10)/10:null,label:ref.toLocaleDateString('en-US',{month:'short'})});
  }
  return result;
}

function renderMetricChart(metricId,range){
  const W=320,H=150,PL=36,PR=12,PT=12,PB=28;
  const data=range==='year'?getMetricHistoryMonthly(metricId,12):getMetricHistory(metricId,range==='week'?7:30);
  const hasData=data.some(d=>d.value!==null);
  if(!hasData) return el('div','chart-empty','No data yet — start logging in the Log tab');
  const vals=data.filter(d=>d.value!==null).map(d=>d.value);
  const minV=Math.min(...vals),maxV=Math.max(...vals),rng=maxV-minV||1;
  const n=data.length,cW=W-PL-PR,cH=H-PT-PB;
  const tx=i=>PL+i/(n-1)*cW,ty=v=>PT+cH-(v-minV)/rng*cH;
  let svg=`<svg viewBox="0 0 ${W} ${H}" class="chart-svg">`;
  [0,0.5,1].forEach(f=>{
    const y=PT+cH*(1-f),v=minV+rng*f;
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#1A1A22" stroke-width="1"/>`;
    svg+=`<text x="${PL-3}" y="${y+3.5}" text-anchor="end" fill="#3A3A48" font-size="8">${Math.round(v)}</text>`;
  });
  let pts=data.filter(d=>d.value!==null).map((d,_,arr)=>{
    const i=data.indexOf(d);return{x:tx(i),y:ty(d.value)};
  });
  // Draw connected line segments for non-null points
  let pathD='';let prev=null;
  data.forEach((d,i)=>{
    if(d.value===null){prev=null;return;}
    const x=tx(i),y=ty(d.value);
    if(prev===null) pathD+=`M${x} ${y}`;else pathD+=` L${x} ${y}`;
    prev={x,y};
  });
  if(pathD) svg+=`<path d="${pathD}" stroke="#5B9FC8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
  data.forEach((d,i)=>{
    if(d.value===null) return;
    svg+=`<circle cx="${tx(i)}" cy="${ty(d.value)}" r="3" fill="#5B9FC8"><title>${d.label}: ${d.value}</title></circle>`;
  });
  const labelEvery=n<=7?1:n<=30?7:1;
  data.forEach((d,i)=>{
    if(i%labelEvery!==0&&i!==n-1) return;
    svg+=`<text x="${tx(i)}" y="${H-5}" text-anchor="middle" fill="#3A3A48" font-size="7.5">${d.label}</text>`;
  });
  svg+='</svg>';
  const wrap=el('div');wrap.innerHTML=svg;return wrap;
}

      bpW.appendChild(sys);bpW.appendChild(sep);bpW.appendChild(dia);

    } else {
      const inp=el('input','met-inp');

  });
  const btn=el('button','met-save','Save Today\'s Log');
  btn.onclick=()=>{
    const data={};
    METRICS_DEF.forEach(m=>{
      if(m.type==='bp'){
        const sv=inputs['bpSys']?.value,dv=inputs['bpDia']?.value;
        if(sv) data.bpSys=parseFloat(sv);if(dv) data.bpDia=parseFloat(dv);

    btn.textContent='Saved ✓';btn.style.background='#4A7A50';

function makeGrpHd(text){
  return el('div','grp-hd',`<div class="grp-line"></div><span class="grp-txt">${text}</span><div class="grp-line"></div>`);
}

function makeCheckRow(item){
  const checked=!!S.checked[item.id];
  const expanded=!!S.expanded[item.id];
  const row=el('div','crow'+(checked?' done':''));
  row.id='R'+item.id;
  const inner=el('div','crow-in');

  const box=el('div','cbox'+(checked?' on':''));
  box.id='B'+item.id;
  if(checked) box.innerHTML=chkSVG();
  box.onclick=()=>doCheck(item.id);

  const body=el('div','cbody');
  body.onclick=()=>doExpand(item.id);
  const tr=el('div','ctxt-row');
  const tx=el('span','ctxt',item.text);
  tx.id='T'+item.id;
  tr.appendChild(tx);
  if(item.tag) tr.appendChild(tagEl(item.tag));
  body.appendChild(tr);
  if(expanded&&item.note){
    const n=el('div','cnote',item.note);
    body.appendChild(n);
  }

  const ch=el('button','chev',chevSVG(expanded));
  ch.onclick=()=>doExpand(item.id);

  inner.appendChild(box);
  inner.appendChild(body);
  if(item.note) inner.appendChild(ch);
  row.appendChild(inner);
  return row;
}

function makeGroup(item){
  const children=item.children||[];
  const done=children.filter(c=>S.checked[c.id]).length;
  const full=done===children.length&&children.length>0;
  const isExp=!!S.expanded[item.id];
  const wrap=el('div');

  const par=el('div','grp-parent');
  const inner=el('div','crow-in');
  const body=el('div','cbody');
  body.onclick=()=>doExpand(item.id);
  const tr=el('div','ctxt-row');
  const tx=el('span','ctxt',item.text);
  tx.style.fontWeight='600';
  tr.appendChild(tx);
  if(item.tag) tr.appendChild(tagEl(item.tag));
  const badge=el('span','grp-badge'+(full?' full':''),`${done}/${children.length}`);
  tr.appendChild(badge);
  body.appendChild(tr);
  const ch=el('button','chev',chevSVG(isExp));
  ch.onclick=()=>doExpand(item.id);
  inner.appendChild(body);
  inner.appendChild(ch);
  par.appendChild(inner);
  wrap.appendChild(par);

  if(isExp){
    const cw=el('div','grp-children');
    if(item.groupNote){
      const gn=el('div','cnote',item.groupNote);
      gn.style.cssText='padding:8px 12px 4px;border-bottom:1px solid #131318;font-size:11px;color:#5A5A68';
      cw.appendChild(gn);
    }
    children.forEach(child=>cw.appendChild(makeCheckRow(child)));
    wrap.appendChild(cw);
  }
  return wrap;
}

function makeChoice(item){
  const sel=S.choices[item.id];
  const wrap=el('div','choice-row');
  const inner=el('div','choice-in');
  const lbl=el('div','choice-lbl',item.text);
  inner.appendChild(lbl);
  const opts=el('div','choice-opts');
  item.opts.forEach(opt=>{
    const btn=el('button','choice-btn'+(sel===opt.id?' sel':''),opt.label);
    btn.onclick=()=>{
      const newSel=sel===opt.id?null:opt.id;
      S.choices[item.id]=newSel;
      S.checked[item.id]=!!newSel;
      // clear sa3 checked state if switching away from micellar water
      if(item.id==='sa_cleanse' && newSel!=='sa_water') delete S.checked['sa3'];
      save();
      renderContent();
    };
    opts.appendChild(btn);
  });
  inner.appendChild(opts);
  if(sel){
    const selOpt=item.opts.find(o=>o.id===sel);
    if(selOpt&&selOpt.note){
      const note=el('div','choice-extra');
      note.innerHTML=`<span style="font-size:11px;color:#5A5A68">${selOpt.note}</span>`;
      inner.appendChild(note);
    }
  }
  wrap.appendChild(inner);
  return wrap;
}

function makeSection(title,color,items){
  const ck=allCheckable(items);
  const done=ck.filter(i=>S.checked[i.id]).length;
  const f=document.createDocumentFragment();
  const hd=el('div','sec-hd');
  hd.innerHTML=`<div class="sec-left"><div class="sec-dot" style="background:${color}"></div><span class="sec-lbl" style="color:${color}">${title}</span></div><span class="sec-ct">${done}/${ck.length}</span>`;
  f.appendChild(hd);
  items.forEach(item=>{
    if(!item.type && !itemVisible(item)) return;
    if(item.showIf && !Object.values(S.choices).includes(item.showIf)) return;
    if(item.type==='header') f.appendChild(makeGrpHd(item.text));
    else if(item.type==='group') f.appendChild(makeGroup(item));
    else if(item.type==='choice') f.appendChild(makeChoice(item));
    else f.appendChild(makeCheckRow(item));
  });
  return f;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────

function doCheck(id){
  S.checked[id]=!S.checked[id];
  save();
  renderContent();
}

function doExpand(id){
  S.expanded[id]=!S.expanded[id];
  save();
  renderContent();
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────

function updateProgress(){
  const base=[...MORNING,...MIDDAY,...EVENING];
  if(S.dayType==='lift'||S.dayType==='both') base.push(...LIFT);
  if(S.dayType==='swim'||S.dayType==='both') base.push(...SWIM);
  const all=allCheckable(base);
  const done=all.filter(i=>S.checked[i.id]).length;
  const pct=all.length>0?Math.round(done/all.length*100):0;
  const color=pct===100?'#5B9F6A':'#C8963C';
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('pct').style.color=color;
  document.getElementById('sub').textContent=`${done}/${all.length} done`;
  const f=document.getElementById('fill');
  f.style.width=pct+'%';
  f.style.background=color;
}

// ── RENDER TABS ───────────────────────────────────────────────────────────────

const TABS=[['daily','Daily'],['meals','Meals'],['stack','Stack']];

function renderTabs(){
  const bar=document.getElementById('tabs');
  bar.innerHTML='';
  TABS.forEach(([id,lbl])=>{
    const b=el('button','tab'+(S.tab===id?' on':''),lbl);
    b.onclick=()=>{S.tab=id;save();renderTabs();renderContent();};
    bar.appendChild(b);
  });
}

// ── RENDER CONTENT ────────────────────────────────────────────────────────────

function renderContent(){
  const c=document.getElementById('content');
  c.innerHTML='';
  const f=document.createDocumentFragment();

  if(S.tab==='daily'){
    f.appendChild(renderDaySelector());
    f.appendChild(makeCollapsSection('morning','Morning','#C8963C',MORNING));
    if(S.dayType==='lift'||S.dayType==='both') f.appendChild(makeCollapsSection('lift','Lift Session','#88C870',LIFT));
    f.appendChild(makeCollapsSection('midday','Midday','#5B9FC8',MIDDAY));
    if(S.dayType==='swim'||S.dayType==='both') f.appendChild(makeCollapsSection('swim','Swim Session','#6ABCBC',SWIM));
    f.appendChild(makeCollapsSection('evening','Evening','#9B7FD4',EVENING));
  }
  else if(S.tab==='metrics'){
    f.appendChild(renderMetrics());
  }
  else if(S.tab==='meals'){
    const w=el('div','g-wrap');
    function mslbl(color,text){
      const d=el('div','g-slbl');
      d.innerHTML=`<div class="g-sdot" style="background:${color}"></div><span class="g-stxt" style="color:${color}">${text}</span>`;
      return d;
    }
    function mcard(cat,items){
      const c=el('div','st-card');
      c.innerHTML=`<div class="st-cat">${cat}</div><div class="st-items">${items}</div>`;
      return c;
    }

    // BREAKFAST
    w.appendChild(mslbl('#C8963C','Breakfast — Build Your Plate'));
    w.appendChild(mcard('Protein — pick 1 or 2','Microwave bacon (2 slices = 7g) · Scrambled eggs · Yoplait yogurt peach · Skim milk (drink alongside)'));
    w.appendChild(mcard('Grains — pick 1','Quaker protein oatmeal + skim milk (12g/serving) · Special K cereal · Kind Protein Granola'));
    w.appendChild(mcard('Fruit — add as much as you want','Blackberries · Blueberries · Raspberries · Grapes · Banana'));
    w.appendChild(mcard('Note','Oatmeal + bacon + fruit is the protein-highest easy combo. Cereal or granola days are lower protein — add yogurt or extra bacon to compensate.'));

    // SMOOTHIE
    w.appendChild(mslbl('#5B9FC8','Midday Smoothie'));
    w.appendChild(mcard('Food ingredients','Skim milk · Greek yogurt · Frozen mango · Banana · PB2 (peanut butter powder) · Chia seeds · Spinach · Ice · Pinch of salt'));
    w.appendChild(mcard('Supplement adds (blend in)','Protein powder 1 scoop (30g) · Creatine 5g · Collagen + Probiotics 1 scoop · Beta Alanine 4g · L-Citrulline 6g'));
    w.appendChild(mcard('Timing tip','On swim days, drink ~90 min before practice — citrulline works best as a pre-workout at that window.'));

    // SNACKS
    w.appendChild(mslbl('#D4A84A','Snacks'));
    w.appendChild(mcard('Protein snacks','Kind Protein Bars · Premier Protein chocolate milk (have almost daily) · Kind Protein Granola'));
    w.appendChild(mcard('Lighter snacks','Veggie straws · Skinny Pop popcorn · Low fat wheat thins · Pretzels / pretzel sticks'));
    w.appendChild(mcard('Fruit','Blackberries · Blueberries · Raspberries · Grapes · Banana'));

    // DINNER - EATING IN
    w.appendChild(mslbl('#9B7FD4','Dinner — Eating In'));
    w.appendChild(mcard('Protein — microwave or air fry, pick 1','Turkey hot dogs · Chicken nuggets · Corn dogs · Popcorn shrimp · Air fryer chicken'));
    w.appendChild(mcard('Add a side','Fruit · Veggie straws · Skinny Pop · Wheat thins · Pretzels'));

    // DINNER - TAKEOUT
    w.appendChild(mslbl('#A98FE0','Dinner — Takeout'));
    w.appendChild(mcard('Local Chinese (best)','Sweet & sour chicken + shrimp fried rice'));
    w.appendChild(mcard('Panda Express','Orange Chicken double plate + mixed veg + rice'));
    w.appendChild(mcard('MOD Pizza','Pepperoni + sausage + bacon, light cheese'));
    w.appendChild(mcard('Five Guys (infrequent)','Bacon burgers'));

    const pad=el('div');pad.style.height='24px';w.appendChild(pad);
    f.appendChild(w);
  }
  else if(S.tab==='stack'){
    const w=el('div','stk-wrap');
    STACK.forEach(sec=>{
      const s=el('div','stk-sec');
      const hd=el('div','sec-hd');
      hd.style.padding='0 0 8px';
      hd.innerHTML=`<div class="sec-left"><div class="sec-dot" style="background:${sec.color}"></div><span class="sec-lbl" style="color:${sec.color}">${sec.label}</span></div>`;
      s.appendChild(hd);
      const tbl=el('div','stk-tbl');
      sec.rows.forEach(([name,dose,timing,type,desc])=>{
        const r=el('div','stk-row');
        r.style.alignItems='flex-start';
        r.innerHTML=`<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="stk-name">${name}</span><span class="stk-type">${type}</span></div>${desc?`<div style="font-size:10px;color:#5A5A68;margin-top:3px;line-height:1.45">${desc}</div>`:''}</div><div class="stk-r" style="flex-shrink:0;padding-left:8px"><div class="stk-dose" style="color:${sec.color}">${dose}</div><div class="stk-timing">${timing}</div></div>`;
        tbl.appendChild(r);
      });
      s.appendChild(tbl);
      w.appendChild(s);
    });
    f.appendChild(w);
  }
  c.appendChild(f);
  updateProgress();
}

// ── INIT ──────────────────────────────────────────────────────────────────────

load();
renderTabs();
renderContent();
</script>
</body>
</html>
